<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ODEE Multi-Tenant Isolation Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <main class="layout">
        <section class="card section-block" id="playground">
          <div class="toolbar">
            <label class="field user-field">
              <span>User</span>
              <select id="userSelect"></select>
            </label>

            <div class="toolbar-actions">
              <button
                class="button button-primary"
                type="button"
                data-modal-target="studentModal"
              >
                Add student
              </button>
              <button id="attackButton" class="button button-secondary" type="button">
                Test blocked read
              </button>
              <button id="resetButton" class="button button-ghost" type="button">
                Reset
              </button>
              <button class="button button-secondary" type="button" data-modal-target="sqlModal">
                SQL
              </button>
              <button class="button button-secondary" type="button" data-modal-target="apiModal">
                API
              </button>
              <button class="button button-secondary" type="button" data-modal-target="testModal">
                Test
              </button>
            </div>
          </div>

          <div class="playground-grid">
            <div class="side-panel">
              <article class="inner-card context-box" id="contextBox"></article>
              <article class="inner-card status-box">
                <div class="panel-header">
                  <h3>Status</h3>
                </div>
                <pre class="inline-console" id="attackResult">Ready.</pre>
              </article>
            </div>

            <article class="inner-card data-panel">
              <div class="panel-header">
                <h3>Students</h3>
              </div>
              <div class="list-head">
                <span>Name</span>
                <span>Grade</span>
                <span>Track</span>
                <span>City</span>
              </div>
              <div class="student-list" id="studentList"></div>
            </article>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-shell hidden" id="studentModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-card">
        <div class="modal-header">
          <h3>Add student</h3>
          <button class="icon-button" type="button" data-close-modal aria-label="Close modal">
            ×
          </button>
        </div>
        <form id="studentForm" class="student-form">
          <label class="field">
            <span>Name</span>
            <input name="name" type="text" placeholder="Student name" required />
          </label>
          <label class="field">
            <span>Grade</span>
            <input name="grade" type="text" placeholder="Class 7" required />
          </label>
          <label class="field">
            <span>Learning track</span>
            <input name="learningTrack" type="text" placeholder="Adaptive Math" required />
          </label>
          <label class="field">
            <span>City</span>
            <input name="city" type="text" placeholder="Bengaluru" required />
          </label>
          <button class="button button-primary" type="submit">Create student</button>
        </form>
      </div>
    </div>

    <div class="modal-shell hidden" id="sqlModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-card modal-card-wide">
        <div class="modal-header">
          <h3>SQL migration</h3>
          <button class="icon-button" type="button" data-close-modal aria-label="Close modal">
            ×
          </button>
        </div>
        <pre id="sqlMigration" class="code-block modal-code"></pre>
      </div>
    </div>

    <div class="modal-shell hidden" id="apiModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-card modal-card-wide">
        <div class="modal-header">
          <h3>API route</h3>
          <button class="icon-button" type="button" data-close-modal aria-label="Close modal">
            ×
          </button>
        </div>
        <pre id="apiChanges" class="code-block modal-code"></pre>
      </div>
    </div>

    <div class="modal-shell hidden" id="testModal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-card modal-card-wide">
        <div class="modal-header">
          <h3>Test query</h3>
          <button class="icon-button" type="button" data-close-modal aria-label="Close modal">
            ×
          </button>
        </div>
        <pre id="testQueries" class="code-block modal-code"></pre>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
